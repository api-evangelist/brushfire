    - POST   https://api.brushfire.com/hooks/unsubscribe
    - GET    https://api.brushfire.com/hooks/poll
  endpointsModeled: false
  endpointsNote: |
    Endpoints above are taken verbatim from Brushfire's published OpenAPI 3.0.1
    document (api-version 2025-07-22) served at api.brushfire.com/swagger. They
    are real, documented paths, not modeled. Request/response schemas were not
    exercised live because calls require an authenticated App Key.
sources:
  - url: https://developer.brushfire.com
    type: Documentation
    note: Brushfire developer portal; App Key requested at /key; documents 429 rate limiting with X-Rate-Limit-* headers and 412 on missing api-version.
  - url: https://api.brushfire.com/swagger/index.html
    type: APIReference
    note: Swagger UI listing date-based API versions; latest is 2025-07-22.
  - url: https://api.brushfire.com/swagger/2025-07-22/swagger.json
    type: OpenAPI
    note: OpenAPI 3.0.1 document, 118 paths / 135 operations, apiKey (Authorization header) security scheme. All REST; no WebSocket channel.
  - url: https://www.brushfire.com/pricing/
    type: Pricing
    note: Per-ticket fee model by organization type plus Stripe/Square processing.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Brushfire's own public API is request/response REST (OpenAPI 3.0.1) with an
    HTTP webhook (Hooks) notification surface and no WebSocket or SSE server-push
    transport. No AsyncAPI document was created because there is no streaming
    transport on Brushfire's own API to model; Hooks are covered as HTTP webhooks
    within the REST surface.
