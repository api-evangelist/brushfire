    - GET    https://api.brushfire.com/events/{eventId}/bestseats
    - GET    https://api.brushfire.com/events/{eventId}/orders
    - GET    https://api.brushfire.com/attendees/{attendeeId}
    - POST   https://api.brushfire.com/attendees/{attendeeId}/cancel
    - GET    https://api.brushfire.com/attendees/{attendeeId}/fields
    - POST   https://api.brushfire.com/attendees/{attendeeId}/type
    - POST   https://api.brushfire.com/attendees/ids
    - GET    https://api.brushfire.com/orders
    - POST   https://api.brushfire.com/orders
    - GET    https://api.brushfire.com/orders/{orderId}
    - POST   https://api.brushfire.com/orders/direct
    - POST   https://api.brushfire.com/orders/pos
