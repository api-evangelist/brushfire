  /events/{eventId}/sections/{sectionId}/seats:
    get:
      tags:
      - Events
      summary: Get all the seats in a section for a specific event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: sectionId
        in: path
        description: A string (the exact name) or a GUID representing the section
        required: true
        schema:
          type: string
      - name: groupId
        in: query
        description: An integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: seatCode
        in: query
        description: A seat-level access code to unlock seats
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSeatOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSeatOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/sessions:
    get:
      tags:
      - Events
      summary: Get a list of all of the sessions for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: search
        in: query
        description: A string to filter sessions
        schema:
          type: string
      - name: includeHidden
        in: query
        description: Show hidden sessions
        schema:
