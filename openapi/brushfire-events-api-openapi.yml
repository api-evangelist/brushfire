openapi: 3.0.1
info:
  title: 'Brushfire API: Version 2025-07-22 AccessCodes Events API'
  version: '2025-07-22'
  description: 'The Brushfire REST API provides programmatic access to the Brushfire event ticketing and registration platform. It covers events, ticket types, sections and seats, attendees, orders, the shopping cart and checkout flow, groups, sessions and check-in, promotions and access codes, payment profiles, and webhooks (Hooks). Authenticate by sending your App Key (requested at https://developer.brushfire.com/key) in the Authorization header. The API is date-versioned: send the desired version in the api-version request header (for example, 2025-07-22). This document is the live specification published at api.brushfire.com/swagger.'
  contact:
    name: Brushfire Developers
    url: https://developer.brushfire.com
servers:
- url: https://api.brushfire.com
  description: Brushfire API (date-versioned via the api-version header)
tags:
- name: Events
paths:
  /events:
    get:
      tags:
      - Events
      summary: Get a list of events for the specified user.
      parameters:
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      - name: search
        in: query
        description: A string to filter events
        schema:
          type: string
      - name: inactive
        in: query
        description: Boolean pass in true to return inactive events.
        schema:
          type: boolean
          default: false
      - name: qty
        in: query
        description: An integer to limit the number of results returned
        schema:
          type: integer
          format: int32
      - name: skip
        in: query
        description: An integer to skip the first events returned
        schema:
          type: integer
          format: int32
      - name: archive
        in: query
        description: Boolean to return archived or not archvied events
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventListOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventListOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
    post:
      tags:
      - Events
      summary: Create a fully complete event
      requestBody:
        description: The request body to create an event
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateInput'
          text/json:
            schema:
              $ref: '#/components/schemas/EventCreateInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCreateInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailsOutput'
            text/json:
              schema:
                $ref: '#/components/schemas/EventDetailsOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}:
    delete:
      tags:
      - Events
      summary: Delete an event
      parameters:
      - name: accessKey
        in: query
        description: Access Key for user account
        schema:
          type: string
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to the specific event you would like to delete
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean
            text/json:
              schema:
                type: boolean
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
    get:
      tags:
      - Events
      summary: Retrieve information for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSingleOutput'
            text/json:
              schema:
                $ref: '#/components/schemas/EventSingleOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/archive:
    post:
      tags:
      - Events
      summary: Queues the specified event for archiving. Sends an email to user associated with the access key used on completion.
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean
            text/json:
              schema:
                type: boolean
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/bestseats:
    get:
      tags:
      - Events
      summary: Returns the best available seats that match the supplied parameters for an assigned seat event. Does not reserve them.
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: quantity
        in: query
        description: Integer to find a quantity of seats
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
      - name: sectionId
        in: query
        description: An optional string (the exact name) or a GUID representing the section
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      - name: typeId
        in: query
        description: Optional GUID to find seats in a particular type
        schema:
          type: string
          format: uuid
      - name: groupId
        in: query
        description: An optional integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: seatCode
        in: query
        description: An optional seat-level access code to unlock seats
        schema:
          type: string
      - name: nonconsecutive
        in: query
        description: Optional boolean to find seats that are non-consecutive
        schema:
          type: boolean
          default: false
      - name: basePrice
        in: query
        description: Optional decimal to find seats in a particular base price
        schema:
          type: number
          format: double
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSeatOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSeatOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/communities:
    get:
      tags:
      - Events
      summary: Returns all communities for the specified event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventCommunityOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventCommunityOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/data:
    get:
      tags:
      - Events
      summary: Returns all data for the specified type
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: type
        in: query
        description: A string value of "Attendee", "Order", or "Group"
        schema:
          $ref: '#/components/schemas/FieldMetaType'
      - name: since
        in: query
        description: An optional date (UTC) from which to filter data
        schema:
          type: string
          format: date-time
      - name: includeCancelled
        in: query
        description: An optional boolean (default false) to include cancelled attendees
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
            text/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/details:
    get:
      tags:
      - Events
      summary: Retrieve information for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: groupId
        in: query
        description: An integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      - name: access
        in: query
        description: The Access Code for accessing the event
        schema:
          type: string
      - name: exchangeId
        in: query
        description: An optional exchange ID if currently exchanging
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailsOutput'
            text/json:
              schema:
                $ref: '#/components/schemas/EventDetailsOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/documents:
    get:
      tags:
      - Events
      summary: Get which printing layouts are available for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDocumentOutput'
            text/json:
              schema:
                $ref: '#/components/schemas/EventDocumentOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/fieldmetadata:
    get:
      tags:
      - Events
      summary: Get the meta data for ALL fields for an event including the built-in/system ones
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldMetaOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldMetaOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/fields:
    get:
      tags:
      - Events
      summary: Get fields for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: fieldType
        in: query
        description: One of "Attendees", "Groups", or "Buyers" for the type of fields you want
        schema:
          $ref: '#/components/schemas/FieldUpdateType'
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/fields/{fieldId}/remotevalidate:
    get:
      tags:
      - Events
      summary: Fetch result for given Remote Valid field when value is provided
      parameters:
      - name: eventNumber
        in: query
        description: An integer that corresponds to a specific event
        schema:
          type: integer
          format: int64
      - name: fieldId
        in: path
        description: A GUID of the Remote Fetch field
        required: true
        schema:
          type: string
          format: uuid
      - name: value
        in: query
        description: The string of the value currently used in the attendee's search field. Required.
        schema:
          type: string
      - name: attendeeNumber
        in: query
        description: The attendee number for the current attendee. Only applied to attendee fields
        schema:
          type: integer
          format: int64
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/groups:
    get:
      tags:
      - Events
      summary: List all groups for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: search
        in: query
        description: A string to filter groups
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupSummaryOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupSummaryOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/lookup:
    get:
      tags:
      - Events
      summary: Look up attendees based upon email for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: email
        in: query
        description: The email of the attendee, buyer, or group manager
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LookupAttendeeResultOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LookupAttendeeResultOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/move:
    post:
      tags:
      - Events
      summary: "Move an event to a different client. The event must have no existing orders or emails.\r\nThe calling app must have access to both the source and target clients."
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to the specific event you would like to move
        required: true
        schema:
          type: string
      requestBody:
        description: Request body for moving an event to a different client
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventMoveInput'
          text/json:
            schema:
              $ref: '#/components/schemas/EventMoveInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventMoveInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSingleOutput'
            text/json:
              schema:
                $ref: '#/components/schemas/EventSingleOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/orders:
    get:
      tags:
      - Events
      summary: Gets list of orders for an event with an optional date range.
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event.
        required: true
        schema:
          type: string
      - name: startsAt
        in: query
        description: Optional start date to filter list
        schema:
          type: string
          format: date-time
      - name: endsAt
        in: query
        description: Optional end date to filter list
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderListOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderListOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/paymentmethods:
    get:
      tags:
      - Events
      summary: Get which payment methods are available for an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventPaymentMethodOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventPaymentMethodOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/reports/{reportId}:
    get:
      tags:
      - Events
      summary: Get report data for a custom or preset event report
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: reportId
        in: path
        description: A GUID that corresponds to a specific report or a string that corresponds to a specific report preset
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
            text/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/resources:
    get:
      tags:
      - Events
      summary: Get a list of resource urls corresponding to specific Brushfire pages for the event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResourceOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResourceOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/restore:
    post:
      tags:
      - Events
      summary: Queues the specified event for restoring. Sends an email to user associated with the access key used on completion.
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: accessKey
        in: query
        description: The Access Key for the user context
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean
            text/json:
              schema:
                type: boolean
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/sections:
    get:
      tags:
      - Events
      summary: Get the details for all the sections of an event
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: groupId
        in: query
        description: An integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: seatCode
        in: query
        description: A seat-level access code to unlock seats
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSectionOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSectionOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/sections/{sectionId}:
    get:
      tags:
      - Events
      summary: Get the details for a specific section
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: sectionId
        in: path
        description: A string (the exact name) or a GUID representing the section
        required: true
        schema:
          type: string
      - name: groupId
        in: query
        description: An integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: seatCode
        in: query
        description: A seat-level access code to unlock seats
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSectionOutput'
            text/json:
              schema:
