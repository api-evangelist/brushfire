            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventId}/types:
    get:
      tags:
      - Events
      summary: List all currently available attendee types for a specific event and account (and optionally a specific seat)
      parameters:
      - name: eventId
        in: path
        description: An integer or a GUID that corresponds to a specific event
        required: true
        schema:
          type: string
      - name: group
        in: query
        description: An integer or a GUID that corresponds to a specific group
        schema:
          type: string
      - name: accessKey
        in: query
        description: Access Key for user account
        schema:
          type: string
      - name: access
        in: query
        description: The Access Code for accessing the types
        schema:
          type: string
      - name: seat
        in: query
        description: A GUID that corresponds to a specific seat, if blank, will return all types for the event
        schema:
          type: string
          format: uuid
      - name: category
        in: query
        description: A string value of "All", "Standard", or "Addon" which determines which type of Attendee Type will be returned. The default is "Standard" which returns only Standard types.
        schema:
          $ref: '#/components/schemas/AttendeeTypeCategory'
      - name: exchangeId
        in: query
        description: An optional exchange ID if currently exchanging
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventTypeOutput'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventTypeOutput'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/{eventNumber}/fields/{fieldId}/remotefetch:
    get:
      tags:
      - Events
      summary: Fetch options for given Remote Fetch field when searching a specified value
      parameters:
      - name: eventNumber
        in: path
        description: An integer that corresponds to a specific event
        required: true
        schema:
          type: integer
          format: int64
      - name: fieldId
        in: path
        description: A GUID of the Remote Fetch field
        required: true
        schema:
          type: string
          format: uuid
      - name: attendeeNumber
        in: query
        description: The attendee number for the current attendee. Only applied to attendee fields
        schema:
          type: integer
          format: int64
      - name: value
        in: query
        description: The string of the value currently used in the attendee's search field
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RemoteFetchResult'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RemoteFetchResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
            text/json:
              schema:
                $ref: '#/components/schemas/ApiModelError'
      security:
      - apiKey: []
  /events/copy:
    post:
      tags:
      - Events
      summary: Copy an existing event
      requestBody:
        description: Request body for copying an event. Leave fields empty if you would like to use the source event's values
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCopyInput'
          text/json:
            schema:
              $ref: '#/components/schemas/EventCopyInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCopyInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
