description: >-
  FinOps view of Brushfire spend. Brushfire bills on a per-ticket basis rather
  than a metered API subscription - the REST API and App Key are free, and cost
  is incurred when paid tickets are sold, whether through the UI or the API.
  Published per-ticket fees vary by organization type (for example $0.75 for
  attractions/education, $1.50 for general events, $1 + 1% for faith
  organizations, or a $299/mo flat option for smaller churches), and credit-card
  processing through Stripe or Square is charged on top at their standard rates.
  There are no setup fees and no monthly contracts, so spend scales directly with
  paid ticket volume plus payment processing.
notes: >-
  Per-ticket fees and processing rates were read from brushfire.com/pricing at
  review time and can change; reconcile against a Brushfire quote. Free tickets
  are generally free to issue. The API carries no separate metered cost, so the
  cost drivers to model are paid-ticket volume and card-processing fees.
