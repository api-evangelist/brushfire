meters:
- name: paid_tickets
  description: Paid tickets sold, billed at the per-ticket fee for the organization type.
  unit: tickets
  aggregation: sum
  dimensions:
  - account
  - event
  - ticketType
- name: card_processing
  description: Credit-card processing fees charged by Stripe or Square on top of the Brushfire per-ticket fee.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - event
  - processor
- name: flat_monthly
  description: Optional flat monthly fee (for example, the $299/mo church tier) where applicable instead of per-ticket fees.
  unit: months
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track paid-ticket volume and processing fees per event and ticket type; free tickets should net to zero fee.
- name: Allocation
  description: Map events and ticket types to internal programs or campuses so ticket-fee spend maps to cost centers.
- name: Optimization
  description: Choose the fee-handling model (pass to attendee, absorb, or split) deliberately; pick the org-appropriate pricing tier; use the flat monthly option when ticket volume makes it cheaper than per-ticket fees.
- name: Accountability
  description: Assign an owner per event; review per-ticket and processing spend against ticket revenue after each event.
