  - Events
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.brushfire.com
  baseURL: https://api.brushfire.com
  properties:
  - url: https://developer.brushfire.com
    type: Documentation
  - url: https://api.brushfire.com/swagger/index.html
    type: APIReference
  - url: openapi/brushfire-openapi.json
    type: OpenAPI
  description: Subscribe and unsubscribe HTTP webhook endpoints, update subscriptions,
    list active hooks, send test pings and sample payloads, and poll for events -
    Brushfire's outbound event-notification surface delivered as HTTP callbacks, not
    a WebSocket stream.
